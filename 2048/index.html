<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Clear Sans", "Helvetica Neue", Arial, sans-serif;
            background: #faf8ef;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
            user-select: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 72px;
            font-weight: bold;
            color: #776e65;
        }

        .scores {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background: #bbada0;
            color: #eee4da;
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
            min-width: 80px;
        }

        .score-box .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-box .value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .tagline {
            color: #776e65;
            font-size: 16px;
        }

        .btn {
            background: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #9f8b77;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .game-board {
            background: #bbada0;
            border-radius: 10px;
            padding: 12px;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .cell {
            aspect-ratio: 1;
            background: #cdc1b4;
            border-radius: 6px;
        }

        .tiles {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            pointer-events: none;
        }

        .tile {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 6px;
            transition: top 150ms ease-out, left 150ms ease-out;
        }

        .tile-new {
            animation: appear 200ms ease-out;
        }

        .tile-merged {
            animation: pop 100ms ease-out;
        }

        @keyframes appear {
            0% { opacity: 0; transform: scale(0); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 300ms;
        }

        .game-over.active {
            opacity: 1;
            pointer-events: auto;
        }

        .game-over h2 {
            font-size: 48px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-over .btn {
            font-size: 20px;
            padding: 15px 30px;
        }

        .instructions {
            margin-top: 20px;
            color: #776e65;
            font-size: 14px;
            text-align: center;
        }

        /* 手机竖屏 (<=480px) */
        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
                margin-bottom: 15px;
            }

            .title {
                font-size: 48px;
            }

            .scores {
                width: 100%;
                justify-content: flex-end;
            }

            .score-box {
                padding: 8px 12px;
                min-width: 65px;
            }

            .score-box .label {
                font-size: 10px;
            }

            .score-box .value {
                font-size: 18px;
            }

            .controls {
                margin-bottom: 15px;
            }

            .tagline {
                font-size: 13px;
            }

            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }

            .game-board {
                padding: 8px;
            }

            .grid {
                gap: 8px;
            }

            .instructions {
                font-size: 12px;
                margin-top: 15px;
            }

            .game-over h2 {
                font-size: 36px;
            }

            .game-over .btn {
                font-size: 16px;
                padding: 12px 24px;
            }
        }

        /* 超小屏幕 (<=360px) */
        @media (max-width: 360px) {
            .container {
                padding: 10px;
            }

            .title {
                font-size: 40px;
            }

            .score-box {
                padding: 6px 10px;
                min-width: 55px;
            }

            .score-box .value {
                font-size: 16px;
            }

            .grid {
                gap: 6px;
            }

            .game-board {
                padding: 6px;
            }
        }

        /* 平板及以上 (>=600px) */
        @media (min-width: 600px) {
            .container {
                padding: 40px;
            }

            .header {
                margin-bottom: 30px;
            }

            .title {
                font-size: 80px;
            }

            .score-box {
                padding: 12px 24px;
                min-width: 100px;
            }

            .score-box .label {
                font-size: 13px;
            }

            .score-box .value {
                font-size: 28px;
            }

            .controls {
                margin-bottom: 25px;
            }

            .tagline {
                font-size: 18px;
            }

            .btn {
                padding: 14px 28px;
                font-size: 18px;
            }

            .grid {
                gap: 15px;
            }

            .instructions {
                font-size: 16px;
                margin-top: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">2048</div>
            <div class="scores">
                <div class="score-box">
                    <div class="label">分数</div>
                    <div class="value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="label">最高分</div>
                    <div class="value" id="best">0</div>
                </div>
            </div>
        </div>
        <div class="controls">
            <div class="tagline">合并数字，达到 2048！</div>
            <button class="btn" id="newGame">新游戏</button>
        </div>
        <div class="game-board" id="board">
            <div class="grid">
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
            <div class="tiles" id="tiles"></div>
            <div class="game-over" id="gameOver">
                <h2>游戏结束</h2>
                <button class="btn" id="retry">再玩一次</button>
            </div>
        </div>
        <div class="instructions">
            使用 <strong>方向键</strong> 或 <strong>WASD</strong> 移动方块<br>
            也可以使用滑动手势
        </div>
    </div>

    <script>
        const SIZE = 4;
        const COLORS = {
            2: { bg: '#eee4da', color: '#776e65' },
            4: { bg: '#ede0c8', color: '#776e65' },
            8: { bg: '#f2b179', color: '#f9f6f2' },
            16: { bg: '#f59563', color: '#f9f6f2' },
            32: { bg: '#f67c5f', color: '#f9f6f2' },
            64: { bg: '#f65e3b', color: '#f9f6f2' },
            128: { bg: '#edcf72', color: '#f9f6f2' },
            256: { bg: '#edcc61', color: '#f9f6f2' },
            512: { bg: '#edc850', color: '#f9f6f2' },
            1024: { bg: '#edc53f', color: '#f9f6f2' },
            2048: { bg: '#edc22e', color: '#f9f6f2' },
            super: { bg: '#3c3a32', color: '#f9f6f2' }
        };

        let grid = [];
        let score = 0;
        let best = parseInt(localStorage.getItem('2048-best')) || 0;
        let isAnimating = false;

        const tilesEl = document.getElementById('tiles');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const gameOverEl = document.getElementById('gameOver');
        const boardEl = document.getElementById('board');

        function init() {
            grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(0));
            score = 0;
            updateScore();
            bestEl.textContent = best;
            gameOverEl.classList.remove('active');
            addRandomTile();
            addRandomTile();
            render();
        }

        function getEmptyCells() {
            const empty = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) empty.push({ r, c });
                }
            }
            return empty;
        }

        function addRandomTile() {
            const empty = getEmptyCells();
            if (empty.length === 0) return;
            const { r, c } = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            return { r, c };
        }

        function updateScore() {
            scoreEl.textContent = score;
            if (score > best) {
                best = score;
                localStorage.setItem('2048-best', best);
                bestEl.textContent = best;
            }
        }

        function getColor(value) {
            return COLORS[value] || COLORS.super;
        }

        function getTilePosition(row, col) {
            const cell = document.querySelector('.cell');
            const board = document.querySelector('.game-board');
            if (!cell || !board) return { top: 0, left: 0, size: 80 };

            const boardRect = board.getBoundingClientRect();
            const isMobile = window.innerWidth <= 480;
            const isVerySmall = window.innerWidth <= 360;

            const gap = isVerySmall ? 6 : (isMobile ? 8 : 12);
            const padding = isVerySmall ? 6 : (isMobile ? 8 : 12);
            const availableSize = boardRect.width - padding * 2;
            const cellSize = (availableSize - gap * 3) / 4;

            return {
                top: padding + row * (cellSize + gap),
                left: padding + col * (cellSize + gap),
                size: cellSize
            };
        }

        function getFontSize(value) {
            if (window.innerWidth <= 360) {
                if (value < 100) return 24;
                if (value < 1000) return 20;
                return 16;
            }
            if (window.innerWidth <= 480) {
                if (value < 100) return 32;
                if (value < 1000) return 26;
                return 20;
            }
            if (value < 100) return 48;
            if (value < 1000) return 40;
            if (value < 10000) return 32;
            return 24;
        }

        function render(newTile = null, mergedTiles = []) {
            tilesEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) continue;
                    const { top, left, size } = getTilePosition(r, c);
                    const value = grid[r][c];
                    const color = getColor(value);
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    if (newTile && newTile.r === r && newTile.c === c) {
                        tile.classList.add('tile-new');
                    }
                    if (mergedTiles.some(t => t.r === r && t.c === c)) {
                        tile.classList.add('tile-merged');
                    }
                    tile.style.cssText = `
                        top: ${top}px;
                        left: ${left}px;
                        width: ${size}px;
                        height: ${size}px;
                        background: ${color.bg};
                        color: ${color.color};
                        font-size: ${getFontSize(value)}px;
                    `;
                    tile.textContent = value;
                    tilesEl.appendChild(tile);
                }
            }
        }

        function move(direction) {
            if (isAnimating) return false;

            const oldGrid = grid.map(row => [...row]);
            let moved = false;
            let mergedTiles = [];
            const merged = Array(SIZE).fill(null).map(() => Array(SIZE).fill(false));

            const vectors = {
                up: { dr: -1, dc: 0 },
                down: { dr: 1, dc: 0 },
                left: { dr: 0, dc: -1 },
                right: { dr: 0, dc: 1 }
            };

            const { dr, dc } = vectors[direction];

            const rows = dr === 1 ? [SIZE - 1, SIZE - 2, SIZE - 3, SIZE - 4] : [0, 1, 2, 3];
            const cols = dc === 1 ? [SIZE - 1, SIZE - 2, SIZE - 3, SIZE - 4] : [0, 1, 2, 3];

            for (const r of rows) {
                for (const c of cols) {
                    if (grid[r][c] === 0) continue;

                    let newR = r;
                    let newC = c;

                    while (true) {
                        const nextR = newR + dr;
                        const nextC = newC + dc;

                        if (nextR < 0 || nextR >= SIZE || nextC < 0 || nextC >= SIZE) break;

                        if (grid[nextR][nextC] === 0) {
                            newR = nextR;
                            newC = nextC;
                        } else if (grid[nextR][nextC] === grid[r][c] && !merged[nextR][nextC]) {
                            newR = nextR;
                            newC = nextC;
                            break;
                        } else {
                            break;
                        }
                    }

                    if (newR !== r || newC !== c) {
                        moved = true;
                        if (grid[newR][newC] === grid[r][c]) {
                            grid[newR][newC] *= 2;
                            score += grid[newR][newC];
                            merged[newR][newC] = true;
                            mergedTiles.push({ r: newR, c: newC });
                            grid[r][c] = 0;
                        } else {
                            grid[newR][newC] = grid[r][c];
                            grid[r][c] = 0;
                        }
                    }
                }
            }

            if (moved) {
                updateScore();
                isAnimating = true;
                render(null, mergedTiles);
                setTimeout(() => {
                    addRandomTile();
                    const newTile = getEmptyCells().length === 0 ? null :
                        { r: grid.filter((row, i) => row.some((v, j) => v !== oldGrid[i][j])).length > 0 ? 0 : 0,
                          c: 0 };
                    render();
                    isAnimating = false;

                    if (isGameOver()) {
                        setTimeout(() => gameOverEl.classList.add('active'), 300);
                    }
                }, 150);
            }

            return moved;
        }

        function isGameOver() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (grid[r][c] === 0) return false;
                    if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return false;
                    if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return false;
                }
            }
            return true;
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const keyMap = {
                ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right'
            };
            if (keyMap[e.key]) {
                e.preventDefault();
                move(keyMap[e.key]);
            }
        });

        // Touch controls
        let touchStartX, touchStartY;
        boardEl.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        boardEl.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            if (Math.max(absDx, absDy) < 30) return;

            if (absDx > absDy) {
                move(dx > 0 ? 'right' : 'left');
            } else {
                move(dy > 0 ? 'down' : 'up');
            }

            touchStartX = null;
            touchStartY = null;
        });

        document.getElementById('newGame').addEventListener('click', init);
        document.getElementById('retry').addEventListener('click', init);

        window.addEventListener('resize', () => render());

        init();
    </script>
</body>
</html>
