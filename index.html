<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>怀旧经典</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      font-family: 'Noto Sans SC', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      color: #f5f0e1;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(243, 156, 18, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(231, 76, 60, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 900;
      margin-bottom: 15px;
      background: linear-gradient(90deg, #f39c12, #e74c3c, #9b59b6, #3498db);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 60px rgba(243, 156, 18, 0.3);
      animation: shimmer 3s ease-in-out infinite;
      background-size: 200% 100%;
    }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .subtitle {
      color: #888;
      font-size: 1.1rem;
      margin-bottom: 50px;
      letter-spacing: 2px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .game-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px 20px;
      text-decoration: none;
      color: #f5f0e1;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .game-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-color), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .game-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: var(--accent-color);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 30px var(--glow-color);
    }

    .game-card:hover::before {
      opacity: 1;
    }

    .game-card.block {
      --accent-color: #00ff88;
      --glow-color: rgba(0, 255, 136, 0.2);
    }

    .game-card.game-2048 {
      --accent-color: #f2b179;
      --glow-color: rgba(242, 177, 121, 0.2);
    }

    .game-card.game-24 {
      --accent-color: #f39c12;
      --glow-color: rgba(243, 156, 18, 0.2);
    }

    .game-icon {
      font-size: 3rem;
      margin-bottom: 15px;
      display: block;
    }

    .game-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .game-desc {
      font-size: 0.85rem;
      color: #888;
      line-height: 1.5;
    }

    .footer {
      margin-top: 30px;
      color: #555;
      font-size: 0.8rem;
    }

    @media (max-width: 480px) {
      body {
        padding: 30px 15px;
      }

      h1 {
        font-size: 2.2rem;
      }

      .subtitle {
        font-size: 0.85rem;
        margin-bottom: 30px;
        letter-spacing: 1px;
      }

      .games-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .game-card {
        padding: 20px 15px;
        display: flex;
        align-items: center;
        gap: 15px;
        text-align: left;
      }

      .game-icon {
        font-size: 2.2rem;
        margin-bottom: 0;
        flex-shrink: 0;
      }

      .game-info {
        flex: 1;
      }

      .game-title {
        font-size: 1.1rem;
      }

      .game-desc {
        font-size: 0.8rem;
      }

      .footer {
        font-size: 0.75rem;
      }
    }

    @media (min-width: 600px) {
      h1 {
        font-size: 4rem;
      }

      .subtitle {
        font-size: 1.2rem;
        margin-bottom: 60px;
      }

      .games-grid {
        gap: 25px;
      }

      .game-card {
        padding: 35px 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>怀旧经典</h1>
    <p class="subtitle">童年的回忆 · 益智单机 · 休闲轻量</p>

    <div class="games-grid">
      <a href="block/index.html" class="game-card block">
        <span class="game-icon">🧱</span>
        <div class="game-info">
          <div class="game-title">俄罗斯方块</div>
          <div class="game-desc">经典益智，挑战极限</div>
        </div>
      </a>

      <a href="2048/index.html" class="game-card game-2048">
        <span class="game-icon">🔢</span>
        <div class="game-info">
          <div class="game-title">2048</div>
          <div class="game-desc">合并数字，达到 2048</div>
        </div>
      </a>

      <a href="24point/index.html" class="game-card game-24">
        <span class="game-icon">🃏</span>
        <div class="game-info">
          <div class="game-title">24点</div>
          <div class="game-desc">心算挑战，益智无穷</div>
        </div>
      </a>
    </div>

    <p class="footer">多款经典小游戏，等你来玩</p>
  </div>
</body>
</html>
