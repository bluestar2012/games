<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24点游戏</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Roboto+Mono:wght@500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Noto Sans SC', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: #f5f0e1;
      max-width: 100vw;
      overflow-x: hidden;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #f39c12, #e74c3c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 2px 20px rgba(243, 156, 18, 0.3);
    }

    .subtitle {
      color: #888;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    .cards-container {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 100%;
      padding: 0 10px;
    }

    .card {
      width: 70px;
      height: 100px;
      background: linear-gradient(145deg, #f5f0e1 0%, #e8e0cc 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: #2c1810;
      box-shadow:
        0 6px 20px rgba(0, 0, 0, 0.4),
        inset 0 2px 0 rgba(255, 255, 255, 0.5),
        inset 0 -2px 0 rgba(0, 0, 0, 0.1);
      border: 3px solid #c9b896;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: default;
      user-select: none;
      flex-shrink: 0;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow:
        0 15px 35px rgba(0, 0, 0, 0.5),
        inset 0 2px 0 rgba(255, 255, 255, 0.5),
        inset 0 -2px 0 rgba(0, 0, 0, 0.1);
    }

    .card.red {
      color: #c0392b;
    }

    .card.deal-animation {
      animation: dealCard 0.5s ease-out;
    }

    @keyframes dealCard {
      0% {
        transform: translateY(-100px) rotateZ(-20deg) scale(0.5);
        opacity: 0;
      }
      100% {
        transform: translateY(0) rotateZ(0) scale(1);
        opacity: 1;
      }
    }

    .input-section {
      width: 100%;
      max-width: 400px;
      margin-bottom: 30px;
      padding: 0 15px;
    }

    .expression-input {
      width: 100%;
      padding: 18px 24px;
      font-size: 1.5rem;
      font-family: 'Roboto Mono', monospace;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #f5f0e1;
      text-align: center;
      outline: none;
      transition: all 0.3s ease;
    }

    .expression-input:focus {
      border-color: #f39c12;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 20px rgba(243, 156, 18, 0.2);
    }

    .expression-input::placeholder {
      color: #666;
    }

    .result-display {
      text-align: center;
      margin-top: 15px;
      min-height: 30px;
      font-size: 1.2rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .result-display.success {
      color: #27ae60;
      text-shadow: 0 0 15px rgba(39, 174, 96, 0.5);
    }

    .result-display.error {
      color: #e74c3c;
    }

    .result-display.hint {
      color: #f39c12;
    }

    .buttons-container {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 14px 32px;
      font-size: 1.1rem;
      font-family: 'Noto Sans SC', sans-serif;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #3ddc84 0%, #2ecc71 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
      color: #bdc3c7;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .btn-secondary:hover {
      background: linear-gradient(135deg, #4a5d6e 0%, #34495e 100%);
      color: #f5f0e1;
      transform: translateY(-2px);
    }

    .btn-hint {
      background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
    }

    .btn-hint:hover {
      background: linear-gradient(135deg, #f5a623 0%, #f39c12 100%);
      transform: translateY(-2px);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
    }

    .shake {
      animation: shake 0.4s ease;
    }

    @keyframes celebrate {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .celebrate {
      animation: celebrate 0.5s ease;
    }

    .hint-box {
      margin-top: 30px;
      padding: 20px;
      background: rgba(243, 156, 18, 0.1);
      border: 1px solid rgba(243, 156, 18, 0.3);
      border-radius: 10px;
      max-width: 400px;
      width: calc(100% - 30px);
      text-align: center;
      display: none;
    }

    .hint-box.visible {
      display: block;
    }

    .hint-box code {
      font-family: 'Roboto Mono', monospace;
      color: #f39c12;
      font-size: 1.3rem;
    }

    .rules {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      max-width: 400px;
      width: calc(100% - 30px);
      font-size: 0.85rem;
      color: #777;
      line-height: 1.8;
    }

    .rules strong {
      color: #999;
    }

    /* 平板设备 (600px - 900px) */
    @media (min-width: 600px) {
      .card {
        width: 80px;
        height: 115px;
        font-size: 2.4rem;
      }

      .cards-container {
        gap: 16px;
      }
    }

    /* 桌面设备 (>900px) */
    @media (min-width: 901px) {
      .card {
        width: 90px;
        height: 130px;
        font-size: 2.8rem;
      }

      .cards-container {
        gap: 20px;
        margin-bottom: 40px;
      }
    }

    /* 手机竖屏 (<480px) */
    @media (max-width: 480px) {
      body {
        padding: 25px 15px;
      }

      h1 {
        font-size: 1.8rem;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 0.85rem;
        margin-bottom: 25px;
      }

      .cards-container {
        gap: 8px;
        margin-bottom: 25px;
        padding: 0 5px;
      }

      .card {
        width: 60px;
        height: 85px;
        font-size: 1.7rem;
        border-width: 2px;
        border-radius: 8px;
      }

      .card:hover {
        transform: translateY(-3px) scale(1.03);
      }

      .input-section {
        margin-bottom: 20px;
      }

      .expression-input {
        padding: 14px 18px;
        font-size: 1.2rem;
        border-radius: 10px;
      }

      .buttons-container {
        gap: 10px;
        width: 100%;
        max-width: 320px;
      }

      .btn {
        flex: 1;
        padding: 12px 16px;
        font-size: 0.95rem;
        min-width: 90px;
      }

      .hint-box {
        margin-top: 20px;
        padding: 15px;
      }

      .hint-box code {
        font-size: 1.1rem;
      }

      .rules {
        margin-top: 30px;
        padding: 15px;
        font-size: 0.8rem;
        margin-left: 10px;
        margin-right: 10px;
      }

      .result-display {
        font-size: 1rem;
      }
    }

    /* 超小屏幕 (<360px) */
    @media (max-width: 360px) {
      .card {
        width: 52px;
        height: 75px;
        font-size: 1.5rem;
      }

      .cards-container {
        gap: 6px;
      }

      .btn {
        padding: 10px 12px;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <h1>24点游戏</h1>
  <p class="subtitle">用四张牌的数字，通过加减乘除得到24</p>

  <div class="cards-container" id="cards">
    <div class="card">?</div>
    <div class="card">?</div>
    <div class="card">?</div>
    <div class="card">?</div>
  </div>

  <div class="input-section">
    <input
      type="text"
      class="expression-input"
      id="expression"
      placeholder="输入表达式，如 (3+2)*4+2"
      autocomplete="off"
      spellcheck="false"
    >
    <div class="result-display" id="result"></div>
  </div>

  <div class="buttons-container">
    <button class="btn btn-primary" id="dealBtn">发牌</button>
    <button class="btn btn-hint" id="hintBtn">答案</button>
    <button class="btn btn-secondary" id="clearBtn">清除</button>
  </div>

  <div class="hint-box" id="hintBox">
    <p>其中一种解法:</p>
    <code id="hintExpression"></code>
  </div>

  <div class="rules">
    <strong>规则:</strong> 使用所有四张牌的数字，每个只能用一次，<br>
    可使用 + - × ÷ 和括号，计算结果等于24即胜利。
  </div>

  <script>
    let currentNumbers = [];
    let solution = null;

    const cardsEl = document.getElementById('cards');
    const expressionInput = document.getElementById('expression');
    const resultDisplay = document.getElementById('result');
    const hintBox = document.getElementById('hintBox');
    const hintExpression = document.getElementById('hintExpression');

    // 生成随机数 1-10
    function generateNumbers() {
      return Array.from({ length: 4 }, () => Math.floor(Math.random() * 10) + 1);
    }

    // 动画显示卡片
    function animateCards(numbers) {
      const cardEls = cardsEl.querySelectorAll('.card');
      cardEls.forEach((card, i) => {
        card.classList.remove('deal-animation', 'celebrate', 'shake');
        card.textContent = numbers[i];
        card.classList.toggle('red', numbers[i] === 8 || numbers[i] === 6 || numbers[i] === 4);
        // 触发动画
        void card.offsetWidth;
        card.classList.add('deal-animation');
        setupAnimationEndListener(card);
      });
    }

    // 动画结束后清理类名
    function setupAnimationEndListener(card) {
      card.addEventListener('animationend', () => {
        card.classList.remove('deal-animation');
      }, { once: true });
    }

    // 容器动画结束后清理
    function setupContainerAnimationEndListener(element, className) {
      element.addEventListener('animationend', () => {
        element.classList.remove(className);
      }, { once: true });
    }

    // 计算表达式结果
    function evaluateExpression(expr, numbers) {
      try {
        // 解析用户输入，验证是否只使用了给定的数字
        const usedNums = expr.match(/\d+/g);
        if (!usedNums) return { valid: false, error: '请输入有效数字' };

        const sortedUsed = [...usedNums].map(n => parseInt(n)).sort((a, b) => a - b);
        const sortedGiven = [...numbers].sort((a, b) => a - b);

        if (JSON.stringify(sortedUsed) !== JSON.stringify(sortedGiven)) {
          return { valid: false, error: '必须使用全部四张牌，每张牌只能用一次' };
        }

        // 安全计算
        const sanitized = expr.replace(/\s/g, '').replace(/[^0-9+\-*/().]/g, '');
        if (sanitized !== expr.replace(/\s/g, '')) {
          return { valid: false, error: '表达式包含无效字符' };
        }

        // 使用 Function 安全的计算
        // 注意: 这里已经验证了只包含数字和运算符
        const result = Function('"use strict"; return (' + sanitized + ')')();

        if (typeof result !== 'number' || !isFinite(result)) {
          return { valid: false, error: '表达式计算错误' };
        }

        // 四舍五入到两位小数比较
        const rounded = Math.round(result * 100) / 100;
        return { valid: true, result: rounded };
      } catch (e) {
        return { valid: false, error: '表达式格式错误' };
      }
    }

    // 求解24点 - 优化版本，使用直接计算避免 Function 构造开销
    function solve24(numbers) {
      const ops = ['+', '-', '*', '/'];

      function applyOp(a, b, op) {
        if (op === '+') return a + b;
        if (op === '-') return a - b;
        if (op === '*') return a * b;
        if (op === '/') return b !== 0 ? a / b : null;
        return null;
      }

      function solve(nums, exprs) {
        if (nums.length === 1) {
          if (Math.abs(nums[0] - 24) < 0.0001) return exprs[0];
          return null;
        }

        for (let i = 0; i < nums.length; i++) {
          for (let j = i + 1; j < nums.length; j++) {
            for (let opIdx = 0; opIdx < ops.length; opIdx++) {
              const op = ops[opIdx];
              const c = nums[i], d = nums[j];

              // c op d
              const r1 = applyOp(c, d, op);
              if (r1 !== null && isFinite(r1)) {
                const remaining = nums.filter((_, k) => k !== i && k !== j);
                const newExprs = exprs.filter((_, k) => k !== i && k !== j);
                remaining.push(r1);
                newExprs.push('(' + exprs[i] + op + exprs[j] + ')');
                const result = solve(remaining, newExprs);
                if (result) return result;
              }

              // d op c (非交换运算)
              if (op !== '+' && op !== '*') {
                const r2 = applyOp(d, c, op);
                if (r2 !== null && isFinite(r2)) {
                  const remaining = nums.filter((_, k) => k !== i && k !== j);
                  const newExprs = exprs.filter((_, k) => k !== i && k !== j);
                  remaining.push(r2);
                  newExprs.push('(' + exprs[j] + op + exprs[i] + ')');
                  const result = solve(remaining, newExprs);
                  if (result) return result;
                }
              }
            }
          }
        }
        return null;
      }

      const numStrs = numbers.map(String);
      return solve(numbers, numStrs);
    }

    // 事件处理
    document.getElementById('dealBtn').addEventListener('click', () => {
      currentNumbers = generateNumbers();
      animateCards(currentNumbers);
      expressionInput.value = '';
      resultDisplay.textContent = '';
      resultDisplay.className = 'result-display';
      hintBox.classList.remove('visible');
      expressionInput.focus();

      // 推迟 solve24 计算，让动画先完成渲染
      solution = null;
      setTimeout(() => {
        solution = solve24(currentNumbers);
      }, 0);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      expressionInput.value = '';
      resultDisplay.textContent = '';
      resultDisplay.className = 'result-display';
      expressionInput.focus();
    });

    document.getElementById('hintBtn').addEventListener('click', () => {
      if (solution) {
        hintExpression.textContent = solution;
        hintBox.classList.add('visible');
      } else {
        hintExpression.textContent = '这组牌无解，请重新发牌';
        hintBox.classList.add('visible');
      }
    });

    expressionInput.addEventListener('input', () => {
      if (currentNumbers.length === 0) {
        resultDisplay.textContent = '请点击"发牌"开始游戏';
        resultDisplay.className = 'result-display hint';
        return;
      }

      const expr = expressionInput.value.trim();
      if (!expr) {
        resultDisplay.textContent = '';
        resultDisplay.className = 'result-display';
        return;
      }

      const evalResult = evaluateExpression(expr, currentNumbers);

      if (!evalResult.valid) {
        resultDisplay.textContent = evalResult.error;
        resultDisplay.className = 'result-display error';
        cardsEl.classList.remove('shake');
        void cardsEl.offsetWidth;
        cardsEl.classList.add('shake');
        setupContainerAnimationEndListener(cardsEl, 'shake');
      } else if (evalResult.result === 24) {
        resultDisplay.textContent = '恭喜你答对了！🎉';
        resultDisplay.className = 'result-display success';
        cardsEl.classList.remove('celebrate');
        void cardsEl.offsetWidth;
        cardsEl.classList.add('celebrate');
        setupContainerAnimationEndListener(cardsEl, 'celebrate');
      } else {
        resultDisplay.textContent = `结果: ${evalResult.result}，不等于24`;
        resultDisplay.className = 'result-display error';
        cardsEl.classList.remove('shake');
        void cardsEl.offsetWidth;
        cardsEl.classList.add('shake');
        setupContainerAnimationEndListener(cardsEl, 'shake');
      }
    });

    // 初始发牌
    document.getElementById('dealBtn').click();
  </script>
</body>
</html>
